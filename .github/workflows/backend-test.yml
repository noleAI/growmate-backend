name: Backend Test, Build, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.11"
      COVERAGE_MIN: "90"
      IMAGE_NAME: growmate-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run pytest with coverage gate
        env:
          PYTHONPATH: backend
        run: |
          pytest backend/tests --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=${COVERAGE_MIN}